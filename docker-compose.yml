services:
  api:
    build: .
    ports: ["8000:8000"]
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_DSN=postgresql://user:pass@postgres:5432/db
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.cache:/app/.cache

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
  pg_data:
